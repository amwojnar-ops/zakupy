<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista zakupów</title>
  <meta name="theme-color" content="#f9f8f6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#18181a" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Zakupy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app" role="main">

  <!-- ══ EKRAN GŁÓWNY ══════════════════════════════════════════════════════════ -->
  <div id="homeScreen">
    <header class="home-header">
      <div>
        <div id="homeDate" class="home-date"></div>
        <div class="home-title">Lista zakupów</div>
      </div>
      <div class="conn-row">
        <span class="conn-dot"></span>
        <span class="conn-lbl">łączenie…</span>
      </div>
    </header>
    <button class="home-tile tile-green" id="tileList" aria-label="Lista zakupów">
      <div class="tile-icon-wrap"><i class="ti ti-shopping-cart" aria-hidden="true"></i></div>
      <div class="tile-content">
        <div class="tile-label">Do kupienia</div>
        <div class="tile-count" id="homeTileCount">0</div>
        <div class="tile-sub" id="homeTileSub">produktów</div>
      </div>
      <div class="tile-pills" id="homePills"></div>
      <i class="ti ti-arrow-right tile-arr" aria-hidden="true"></i>
    </button>
    <div class="home-row">
      <button class="home-tile tile-blue tile-half" id="tileShop" aria-label="Sklepy">
        <i class="ti ti-building-store tile-icon-sm" aria-hidden="true"></i>
        <div class="tile-label">Sklepy</div>
        <div class="tile-sub">tryb zakupów</div>
        <i class="ti ti-arrow-right tile-arr" aria-hidden="true"></i>
      </button>
      <button class="home-tile tile-amber tile-half" id="tileDict" aria-label="Słownik produktów">
        <i class="ti ti-book tile-icon-sm" aria-hidden="true"></i>
        <div class="tile-label">Słownik</div>
        <div class="tile-sub" id="homeDictSub">produkty i kat.</div>
        <i class="ti ti-arrow-right tile-arr" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <!-- ══ EKRAN LISTY (dodawanie + podgląd wszystkich) ════════════════════════ -->
  <div id="listScreen" class="hidden">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-back" id="btnBackList" aria-label="Wróć"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <div class="topbar-title"><i class="ti ti-shopping-cart" aria-hidden="true"></i> Do kupienia</div>
      </div>
      <div class="conn-row">
        <span class="conn-dot"></span>
        <span class="conn-lbl">łączenie…</span>
      </div>
    </header>
    <div class="add-panel" role="form">
      <div class="add-row">
        <div class="name-wrap">
          <input type="text" id="inputName" placeholder="Wpisz produkt…" autocomplete="off" aria-label="Nazwa produktu" />
          <div class="ac-drop" id="acDrop" role="listbox"></div>
        </div>
        <input type="number" id="inputQty" value="1" min="1" max="99" aria-label="Ilość" />
      </div>
      <div class="add-row">
        <select id="inputStore" aria-label="Sklep"></select>
        <select id="inputCat" aria-label="Kategoria"></select>
        <button class="primary" id="btnAdd"><i class="ti ti-plus" aria-hidden="true"></i> Dodaj</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn-sm" id="btnClearDone"><i class="ti ti-trash" aria-hidden="true"></i> Usuń kupione</button>
        <button class="btn-sm" id="btnCopy"><i class="ti ti-copy" aria-hidden="true"></i> Kopiuj listę</button>
      </div>
    </div>
    <div id="listItems" aria-live="polite"></div>
  </div>

  <!-- ══ WYBÓR SKLEPU ══════════════════════════════════════════════════════════ -->
  <div id="storeSelectScreen" class="hidden">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-back" id="btnBackStoreSelect" aria-label="Wróć"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <div class="topbar-title"><i class="ti ti-building-store" aria-hidden="true"></i> Wybierz sklep</div>
      </div>
      <div class="conn-row">
        <span class="conn-dot"></span>
        <span class="conn-lbl">łączenie…</span>
      </div>
    </header>
    <div class="store-grid" id="storeGrid"></div>
  </div>

  <!-- ══ TRYB SKLEPU (tylko odhaczanie) ══════════════════════════════════════ -->
  <div id="storeShopScreen" class="hidden">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-back" id="btnBackStoreShop" aria-label="Wróć do sklepów"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <div class="topbar-title" id="storeShopName"></div>
      </div>
      <div class="conn-row">
        <span class="conn-dot"></span>
        <span class="conn-lbl">łączenie…</span>
      </div>
    </header>
    <div class="shop-header" id="storeShopProgress"></div>
    <div id="storeShopList" aria-live="polite"></div>
  </div>

  <!-- ══ SŁOWNIK ═══════════════════════════════════════════════════════════════ -->
  <div id="dictScreen" class="hidden">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-back" id="btnBackDict" aria-label="Wróć"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <div class="topbar-title"><i class="ti ti-book" aria-hidden="true"></i> Słownik produktów</div>
      </div>
    </header>
    <div class="dict-panel" id="dictPanel" style="margin:0 0 1rem">
      <h3>Moje produkty</h3>
      <div class="dict-tag-list" id="dictTagList"></div>
      <div class="dict-add-row" style="margin-top:.75rem">
        <input type="text" id="dictName" placeholder="Nazwa produktu…" aria-label="Nowy produkt" />
        <select id="dictCatSelect" aria-label="Kategoria"></select>
        <button class="primary" id="btnDictAdd"><i class="ti ti-plus" aria-hidden="true"></i> Dodaj</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
